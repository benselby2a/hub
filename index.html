<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐳🏠 Manatee Hub</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg-body: #0a0a1a;
        --bg-tile: #14142a;
        --border-tile: #2a2a4a;
        --border-tile-hover: #5a5a8a;
        --text: #e0e0e0;
        --text-muted: #808098;
        --bg-bar: #10102a;
        --border-bar: #2a2a4a;
        --btn-border: #3a3a5a;
        --btn-text: #c0c0e0;
        --btn-hover: #1e1e3e;
        --toggle-bg: #1e1e3e;
        --bg-input: #14142a;
        --bg-card: #14142a;
        --accent: #4a9eff;
        --error: #ef5350;
      }

      [data-theme="light"] {
        --bg-body: #f0f0f5;
        --bg-tile: #ffffff;
        --border-tile: #d0d0dd;
        --border-tile-hover: #8888aa;
        --text: #1a1a2e;
        --text-muted: #6a6a80;
        --bg-bar: #ffffff;
        --border-bar: #d0d0dd;
        --btn-border: #b0b0c0;
        --btn-text: #3a3a50;
        --btn-hover: #e4e4ee;
        --toggle-bg: #e0e0ea;
        --bg-input: #f5f5f8;
        --bg-card: #ffffff;
        --accent: #2a7ae0;
        --error: #d32f2f;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-body);
        color: var(--text);
        min-height: 100dvh;
      }

      /* ── Auth view ───────────────────────────── */
      .auth-view {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 2rem 1rem;
      }

      .auth-card {
        background: var(--bg-card);
        border: 1px solid var(--border-tile);
        border-radius: 16px;
        padding: 2rem;
        width: 100%;
        max-width: 360px;
      }

      .auth-card h2 {
        text-align: center;
        margin-bottom: 1.25rem;
      }

      .auth-card label {
        display: block;
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
        margin-top: 0.75rem;
      }

      .auth-card input {
        width: 100%;
        padding: 0.5rem 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--border-tile);
        background: var(--bg-input);
        color: var(--text);
        font-size: 0.9rem;
      }

      .auth-card input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .auth-card button[type="submit"] {
        width: 100%;
        margin-top: 1rem;
        padding: 0.55rem;
        border: none;
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }

      .auth-card button[type="submit"]:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .auth-error {
        color: var(--error);
        font-size: 0.8rem;
        margin-top: 0.5rem;
        text-align: center;
      }

      /* ── Top bar ────────────────────────────── */
      .top-bar {
        position: fixed;
        top: 0;
        right: 0;
        display: none;
        align-items: center;
        gap: 0.5rem;
        padding: 6px 0.75rem;
        z-index: 100;
      }

      .top-bar.active {
        display: flex;
      }

      .top-bar-user {
        font-size: 0.6rem;
        color: var(--text-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 140px;
      }

      .sign-out-btn {
        background: none;
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        color: var(--btn-text);
        font-size: 0.7rem;
        padding: 0.15rem 0.4rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      .sign-out-btn:hover {
        background: var(--btn-hover);
      }

      .theme-toggle {
        background: var(--toggle-bg);
        border: 1px solid var(--border-tile);
        border-radius: 6px;
        color: var(--text);
        font-size: 0.7rem;
        padding: 0.15rem 0.4rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }

      .theme-toggle:hover {
        background: var(--btn-hover);
      }

      /* ── Hub view ─────────────────────────────── */
      .hub {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 2rem 1rem;
      }

      .hub.active {
        display: flex;
      }

      .hub-title {
        font-size: 2rem;
        margin-bottom: 2rem;
        text-align: center;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 1.25rem;
        max-width: 480px;
        width: 100%;
      }

      .tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 1.5rem 1rem;
        border-radius: 16px;
        background: var(--bg-tile);
        border: 1px solid var(--border-tile);
        cursor: pointer;
        transition: transform 0.15s, border-color 0.15s;
        text-decoration: none;
        color: inherit;
      }

      .tile:hover {
        transform: translateY(-3px);
        border-color: var(--border-tile-hover);
      }

      .tile img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
      }

      .tile span {
        font-size: 0.95rem;
        font-weight: 500;
        text-align: center;
      }

      /* ── App view ─────────────────────────────── */
      .app-view {
        display: none;
        position: fixed;
        inset: 0;
        flex-direction: column;
      }

      .app-view.active {
        display: flex;
      }

      .app-bar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        height: 40px;
        padding: 0 0.75rem;
        background: var(--bg-bar);
        border-bottom: 1px solid var(--border-bar);
        flex-shrink: 0;
      }

      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        background: none;
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        color: var(--btn-text);
        font-size: 0.8rem;
        padding: 0.25rem 0.6rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      .back-btn:hover {
        background: var(--btn-hover);
      }

      .app-bar-title {
        font-size: 0.85rem;
        color: var(--text-muted);
        flex: 1;
      }

      .refresh-btn {
        background: var(--toggle-bg);
        border: 1px solid var(--border-tile);
        border-radius: 6px;
        color: var(--text);
        font-size: 0.7rem;
        padding: 0.15rem 0.4rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }

      .refresh-btn:hover {
        background: var(--btn-hover);
      }

      .app-frame {
        flex: 1;
        border: none;
        width: 100%;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        color: var(--text-muted);
      }

      /* ── Hub tools ─────────────────────────── */
      .hub-tools {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        margin-top: 2rem;
        padding-bottom: 2rem;
      }

      .hub-tool-btn {
        background: none;
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        color: var(--text-muted);
        font-size: 0.65rem;
        padding: 0.3rem 0.6rem;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }

      .hub-tool-btn:hover {
        background: var(--btn-hover);
        color: var(--text);
      }

      /* ── Audit overlay ─────────────────────── */
      .audit-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .audit-overlay.hidden { display: none; }

      .audit-panel {
        background: var(--bg-tile);
        border: 1px solid var(--border-tile);
        border-radius: 12px;
        width: 100%;
        max-width: 600px;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .audit-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border-tile);
      }

      .audit-header h2 {
        font-size: 0.95rem;
        margin: 0;
      }

      .audit-close {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.1rem;
        cursor: pointer;
      }

      .audit-scroll {
        overflow-y: auto;
        padding: 0.5rem 1rem 1rem;
        flex: 1;
      }

      .audit-loading {
        text-align: center;
        color: var(--text-muted);
        padding: 2rem 0;
      }

      .audit-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.7rem;
      }

      .audit-table th {
        text-align: left;
        padding: 0.4rem 0.5rem;
        border-bottom: 1px solid var(--border-tile);
        color: var(--text-muted);
        font-weight: 600;
        position: sticky;
        top: 0;
        background: var(--bg-tile);
      }

      .audit-table td {
        padding: 0.35rem 0.5rem;
        border-bottom: 1px solid var(--border-tile);
        color: var(--text);
      }

      .audit-table .schema-tag {
        font-size: 0.6rem;
        color: var(--text-muted);
        background: var(--toggle-bg);
        border-radius: 3px;
        padding: 0.1rem 0.3rem;
      }
    </style>
  </head>
  <body>

    <div class="top-bar" id="top-bar">
      <span class="top-bar-user" id="top-bar-user"></span>
      <button class="sign-out-btn" id="sign-out-btn">Sign Out</button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
    </div>

    <div class="loading" id="loading">Loading...</div>

    <div class="auth-view" id="auth-view" style="display:none">
      <h1 style="margin-bottom:1.5rem">🐳 Manatee Hub</h1>
      <div class="auth-card">
        <h2>Sign In</h2>
        <form id="auth-form">
          <label for="auth-email">Email</label>
          <input id="auth-email" type="email" placeholder="you@example.com" required />
          <label for="auth-password">Password</label>
          <input id="auth-password" type="password" placeholder="Password" required minlength="6" />
          <div class="auth-error" id="auth-error"></div>
          <button type="submit" id="auth-submit">Sign In</button>
        </form>
      </div>
    </div>

    <div class="hub" id="hub">
      <h1 class="hub-title">🐳 Manatee Hub</h1>
      <div class="grid" id="grid"></div>
      <div class="hub-tools">
        <button class="hub-tool-btn" id="btn-sql-backup">⬇ Download SQL Backup</button>
        <button class="hub-tool-btn" id="btn-audit-log">📋 Recent Activity</button>
      </div>
    </div>

    <div class="audit-overlay hidden" id="audit-overlay">
      <div class="audit-panel">
        <div class="audit-header">
          <h2>Recent Activity</h2>
          <button class="audit-close" id="audit-close">✕</button>
        </div>
        <div class="audit-scroll" id="audit-scroll">
          <p class="audit-loading">Loading…</p>
        </div>
      </div>
    </div>

    <div class="app-view" id="app-view">
      <div class="app-bar">
        <button class="back-btn" id="back-btn">&#8592; Hub</button>
        <span class="app-bar-title" id="app-bar-title"></span>
        <button class="refresh-btn" id="refresh-btn" aria-label="Force refresh app">&#x21bb;</button>
        <button class="theme-toggle" id="app-theme-toggle" aria-label="Toggle theme">🌙</button>
      </div>
      <iframe class="app-frame" id="app-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-storage-access-by-user-activation"></iframe>
    </div>

    <script>
      const SUPABASE_URL = 'https://cnkznpkvwoqxaiywwmhr.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_xlNQ_QudJNUlMLjWpr0iJA_YgO87tox';
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const apps = [
        { name: 'Savings',          icon: './icons/savings.svg',         url: 'https://benselby2a.github.io/savings/' },
        { name: 'Finances',         icon: './icons/finances.svg',        url: 'https://benselby2a.github.io/finances/' },
        { name: 'Shopping List',    icon: './icons/shoppinglist.svg',    url: 'https://benselby2a.github.io/shoppinglist/' },
        { name: 'Holiday Planner',  icon: './icons/holidaycalendar.svg', url: 'https://benselby2a.github.io/holidaycalendar/' },
      ];

      const els = {
        loading:    document.getElementById('loading'),
        authView:   document.getElementById('auth-view'),
        authForm:   document.getElementById('auth-form'),
        authEmail:  document.getElementById('auth-email'),
        authPass:   document.getElementById('auth-password'),
        authError:  document.getElementById('auth-error'),
        authSubmit: document.getElementById('auth-submit'),
        hub:        document.getElementById('hub'),
        topBar:     document.getElementById('top-bar'),
        topBarUser: document.getElementById('top-bar-user'),
        signOutBtn: document.getElementById('sign-out-btn'),
        grid:       document.getElementById('grid'),
        appView:    document.getElementById('app-view'),
        appFrame:   document.getElementById('app-frame'),
        appTitle:   document.getElementById('app-bar-title'),
        backBtn:    document.getElementById('back-btn'),
        refreshBtn: document.getElementById('refresh-btn'),
        toggle:     document.getElementById('theme-toggle'),
        appToggle:  document.getElementById('app-theme-toggle'),
      };

      // ── Theme ──────────────────────────────────
      const savedTheme = localStorage.getItem('hub-theme');
      if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
      updateToggleIcon();

      els.toggle.addEventListener('click', toggleTheme);

      function getTheme() {
        return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      }

      function updateToggleIcon() {
        const icon = getTheme() === 'light' ? '☀️' : '🌙';
        els.toggle.textContent = icon;
        if (els.appToggle) els.appToggle.textContent = icon;
      }

      function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        if (next === 'dark') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('hub-theme', next);
        updateToggleIcon();
        sendThemeToFrame();
      }

      if (els.appToggle) els.appToggle.addEventListener('click', toggleTheme);

      function sendThemeToFrame() {
        if (els.appFrame.contentWindow) {
          els.appFrame.contentWindow.postMessage({ type: 'theme', value: getTheme() }, '*');
        }
      }

      // ── Views ──────────────────────────────────
      function showView(view, userEmail) {
        els.loading.style.display = 'none';
        els.authView.style.display = 'none';
        els.hub.classList.remove('active');
        els.appView.classList.remove('active');
        els.topBar.classList.remove('active');

        if (view === 'auth') {
          els.authView.style.display = '';
        } else if (view === 'hub') {
          els.hub.classList.add('active');
          els.topBar.classList.add('active');
          els.topBarUser.textContent = userEmail || '';
        }
      }

      // ── Auth ───────────────────────────────────
      let currentUser = null;

      els.authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        els.authError.textContent = '';
        els.authSubmit.disabled = true;
        els.authSubmit.textContent = 'Signing in...';

        const { error } = await sb.auth.signInWithPassword({
          email: els.authEmail.value,
          password: els.authPass.value,
        });

        els.authSubmit.disabled = false;
        els.authSubmit.textContent = 'Sign In';

        if (error) {
          els.authError.textContent = error.message;
        }
      });

      els.signOutBtn.addEventListener('click', () => sb.auth.signOut());

      sb.auth.getSession().then(({ data: { session } }) => {
        if (session) {
          currentUser = session.user;
          showView('hub', session.user.email);
        } else {
          showView('auth');
        }
      });

      sb.auth.onAuthStateChange((_event, session) => {
        if (session) {
          currentUser = session.user;
          if (!els.appView.classList.contains('active')) {
            showView('hub', session.user.email);
          }
        } else {
          currentUser = null;
          showView('auth');
        }
      });

      // ── Tiles ──────────────────────────────────
      apps.forEach(app => {
        const tile = document.createElement('button');
        tile.className = 'tile';
        tile.type = 'button';
        tile.innerHTML = `<img src="${app.icon}" alt="${app.name}"><span>${app.name}</span>`;
        tile.addEventListener('click', () => openApp(app));
        els.grid.appendChild(tile);
      });

      function openApp(app) {
        els.hub.classList.remove('active');
        els.topBar.classList.remove('active');
        els.appView.classList.add('active');
        els.appTitle.textContent = '';
        els.appFrame.src = app.url;
        els.appFrame.onload = () => sendThemeToFrame();
        history.pushState({ app: app.name }, '', `#${app.name.toLowerCase().replace(/\s+/g, '-')}`);
      }

      function closeApp() {
        els.appView.classList.remove('active');
        els.hub.classList.add('active');
        els.topBar.classList.add('active');
        els.appFrame.src = '';
        history.pushState({}, '', location.pathname);
      }

      els.backBtn.addEventListener('click', closeApp);

      els.refreshBtn.addEventListener('click', () => {
        const currentSrc = els.appFrame.src;
        if (!currentSrc) return;
        const url = new URL(currentSrc);
        url.searchParams.set('_bust', Date.now());
        els.appFrame.src = url.toString();
        els.appFrame.onload = () => sendThemeToFrame();
      });

      window.addEventListener('popstate', () => {
        if (els.appView.classList.contains('active')) {
          closeApp();
        }
      });

      // ── Database table map ────────────────────
      const DB_TABLES = [
        // Savings (public schema)
        { schema: 'public', table: 'accounts', app: 'Savings' },
        { schema: 'public', table: 'snapshots', app: 'Savings' },
        { schema: 'public', table: 'owners', app: 'Savings' },
        // Shopping List (public schema)
        { schema: 'public', table: 'shopping_items', app: 'Shopping List' },
        { schema: 'public', table: 'suggestion_items', app: 'Shopping List' },
        { schema: 'public', table: 'meals', app: 'Shopping List' },
        { schema: 'public', table: 'meal_items', app: 'Shopping List' },
        // Holiday Calendar
        { schema: 'holidaycalendar', table: 'people', app: 'Holiday Planner' },
        { schema: 'holidaycalendar', table: 'people_allowance', app: 'Holiday Planner' },
        { schema: 'holidaycalendar', table: 'holidays', app: 'Holiday Planner' },
        { schema: 'holidaycalendar', table: 'bank_holidays', app: 'Holiday Planner' },
        // Finances
        { schema: 'finance_app', table: 'households', app: 'Finances' },
        { schema: 'finance_app', table: 'household_members', app: 'Finances' },
        { schema: 'finance_app', table: 'categories', app: 'Finances' },
        { schema: 'finance_app', table: 'payments', app: 'Finances' },
        { schema: 'finance_app', table: 'payment_contributions', app: 'Finances' },
        { schema: 'finance_app', table: 'payment_splits', app: 'Finances' },
        { schema: 'finance_app', table: 'recurring_templates', app: 'Finances' },
        { schema: 'finance_app', table: 'recurring_template_contributions', app: 'Finances' },
        { schema: 'finance_app', table: 'recurring_template_splits', app: 'Finances' },
        { schema: 'finance_app', table: 'recurring_generation_log', app: 'Finances' },
      ];

      function sbForSchema(schema) {
        if (schema === 'public') return sb;
        return sb.schema(schema);
      }

      // ── SQL Backup ────────────────────────────
      function escSql(val) {
        if (val === null || val === undefined) return 'NULL';
        if (typeof val === 'boolean') return val ? 'TRUE' : 'FALSE';
        if (typeof val === 'number') return String(val);
        if (typeof val === 'object') return "'" + JSON.stringify(val).replace(/'/g, "''") + "'::jsonb";
        return "'" + String(val).replace(/'/g, "''") + "'";
      }

      document.getElementById('btn-sql-backup').addEventListener('click', async () => {
        const btn = document.getElementById('btn-sql-backup');
        btn.disabled = true;
        btn.textContent = '⏳ Generating…';

        try {
          const lines = [];
          lines.push('-- Manatee Hub SQL Backup');
          lines.push('-- Generated: ' + new Date().toISOString());
          lines.push('-- User: ' + (currentUser?.email || 'unknown'));
          lines.push('');

          for (const entry of DB_TABLES) {
            const client = sbForSchema(entry.schema);
            const { data, error } = await client.from(entry.table).select('*');
            if (error) {
              lines.push(`-- ERROR reading ${entry.schema}.${entry.table}: ${error.message}`);
              lines.push('');
              continue;
            }
            const qualifiedName = entry.schema === 'public'
              ? `"${entry.table}"`
              : `"${entry.schema}"."${entry.table}"`;

            lines.push(`-- ${entry.app}: ${qualifiedName} (${(data || []).length} rows)`);

            if (data && data.length > 0) {
              const cols = Object.keys(data[0]);
              lines.push(`DELETE FROM ${qualifiedName};`);
              for (const row of data) {
                const vals = cols.map(c => escSql(row[c])).join(', ');
                lines.push(`INSERT INTO ${qualifiedName} (${cols.map(c => '"' + c + '"').join(', ')}) VALUES (${vals});`);
              }
            } else {
              lines.push(`-- (empty table)`);
            }
            lines.push('');
          }

          const blob = new Blob([lines.join('\n')], { type: 'application/sql' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `manatee-backup-${new Date().toISOString().slice(0,10)}.sql`;
          a.click();
          URL.revokeObjectURL(url);
        } catch (err) {
          alert('Backup failed: ' + err.message);
        } finally {
          btn.disabled = false;
          btn.textContent = '⬇ Download SQL Backup';
        }
      });

      // ── Audit Log ─────────────────────────────
      const auditOverlay = document.getElementById('audit-overlay');
      const auditScroll = document.getElementById('audit-scroll');

      document.getElementById('audit-close').addEventListener('click', () => {
        auditOverlay.classList.add('hidden');
      });
      auditOverlay.addEventListener('click', (e) => {
        if (e.target === auditOverlay) auditOverlay.classList.add('hidden');
      });

      document.getElementById('btn-audit-log').addEventListener('click', async () => {
        auditOverlay.classList.remove('hidden');
        auditScroll.innerHTML = '<p class="audit-loading">Loading…</p>';

        try {
          const rows = [];

          // Add current user's login info
          const { data: { session: auditSession } } = await sb.auth.getSession();
          if (auditSession?.user) {
            const u = auditSession.user;
            if (u.last_sign_in_at) {
              rows.push({
                schema: 'auth', table: 'login', app: 'Hub',
                ts: u.last_sign_in_at,
                user: u.id,
                summary: `Sign in: ${u.email}`,
              });
            }
            if (u.created_at) {
              rows.push({
                schema: 'auth', table: 'signup', app: 'Hub',
                ts: u.created_at,
                user: u.id,
                summary: `Account created: ${u.email}`,
              });
            }
            if (u.updated_at && u.updated_at !== u.created_at) {
              rows.push({
                schema: 'auth', table: 'profile', app: 'Hub',
                ts: u.updated_at,
                user: u.id,
                summary: `Profile updated: ${u.email}`,
              });
            }
          }

          for (const entry of DB_TABLES) {
            const client = sbForSchema(entry.schema);
            let data = null;

            // Try ordering by different timestamp columns
            for (const col of ['created_at', 'updated_at', 'date', 'start_date', 'holiday_date', 'payment_date']) {
              const res = await client
                .from(entry.table)
                .select('*')
                .order(col, { ascending: false })
                .limit(10);
              if (!res.error) { data = res.data; break; }
            }

            // Last resort — no ordering
            if (!data) {
              const res = await client.from(entry.table).select('*').limit(10);
              data = res.data;
            }

            if (data) {
              data.forEach(r => rows.push({
                schema: entry.schema,
                table: entry.table,
                app: entry.app,
                ts: r.updated_at || r.created_at || r.date || r.start_date || r.holiday_date || r.payment_date || null,
                user: r.user_id || r.created_by || null,
                summary: r.name || r.title || r.location || r.email || r.id || '',
              }));
            }
          }

          // Sort by timestamp descending, take 50
          rows.sort((a, b) => {
            if (!a.ts && !b.ts) return 0;
            if (!a.ts) return 1;
            if (!b.ts) return -1;
            return b.ts.localeCompare(a.ts);
          });
          const top = rows.slice(0, 50);

          if (!top.length) {
            auditScroll.innerHTML = '<p class="audit-loading">No data found.</p>';
            return;
          }

          // Build user lookup from current session + any household_members data
          const userMap = {};
          if (auditSession?.user) {
            userMap[auditSession.user.id] = auditSession.user.email;
          }
          // Try to resolve other users from household_members or owners
          for (const r of rows) {
            if (r.user && r.summary && r.summary.includes('@') && !userMap[r.user]) {
              userMap[r.user] = r.summary;
            }
          }
          function resolveUser(uid) {
            if (!uid) return '';
            if (userMap[uid]) return userMap[uid];
            return String(uid).slice(0, 8) + '…';
          }

          let html = '<table class="audit-table"><thead><tr><th>Time</th><th>App / Table</th><th>User</th><th>Detail</th></tr></thead><tbody>';
          for (const r of top) {
            const time = r.ts ? new Date(r.ts).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';
            const tbl = `<span class="schema-tag">${r.app}</span> ${r.table}`;
            const user = resolveUser(r.user);
            const detail = String(r.summary).slice(0, 40);
            html += `<tr><td>${time}</td><td>${tbl}</td><td>${user}</td><td>${detail}</td></tr>`;
          }
          html += '</tbody></table>';
          auditScroll.innerHTML = html;
        } catch (err) {
          auditScroll.innerHTML = `<p class="audit-loading">Error: ${err.message}</p>`;
        }
      });
    </script>
  </body>
</html>
