<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐳🏠 Manatee Hub</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg-body: #0a0a1a;
        --bg-tile: #14142a;
        --border-tile: #2a2a4a;
        --border-tile-hover: #5a5a8a;
        --text: #e0e0e0;
        --text-muted: #808098;
        --bg-bar: #10102a;
        --border-bar: #2a2a4a;
        --btn-border: #3a3a5a;
        --btn-text: #c0c0e0;
        --btn-hover: #1e1e3e;
        --toggle-bg: #1e1e3e;
      }

      [data-theme="light"] {
        --bg-body: #f0f0f5;
        --bg-tile: #ffffff;
        --border-tile: #d0d0dd;
        --border-tile-hover: #8888aa;
        --text: #1a1a2e;
        --text-muted: #6a6a80;
        --bg-bar: #ffffff;
        --border-bar: #d0d0dd;
        --btn-border: #b0b0c0;
        --btn-text: #3a3a50;
        --btn-hover: #e4e4ee;
        --toggle-bg: #e0e0ea;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-body);
        color: var(--text);
        min-height: 100dvh;
      }

      /* ── Theme toggle ────────────────────────── */
      .theme-toggle {
        position: fixed;
        top: 6px;
        right: 0.75rem;
        background: var(--toggle-bg);
        border: 1px solid var(--border-tile);
        border-radius: 6px;
        color: var(--text);
        font-size: 0.8rem;
        width: 28px;
        height: 28px;
        padding: 0;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
        z-index: 100;
      }

      .theme-toggle:hover {
        background: var(--btn-hover);
      }

      /* ── Hub view ─────────────────────────────── */
      .hub {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 2rem 1rem;
      }

      .hub-title {
        font-size: 2rem;
        margin-bottom: 2rem;
        text-align: center;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 1.25rem;
        max-width: 480px;
        width: 100%;
      }

      .tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 1.5rem 1rem;
        border-radius: 16px;
        background: var(--bg-tile);
        border: 1px solid var(--border-tile);
        cursor: pointer;
        transition: transform 0.15s, border-color 0.15s;
        text-decoration: none;
        color: inherit;
      }

      .tile:hover {
        transform: translateY(-3px);
        border-color: var(--border-tile-hover);
      }

      .tile img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
      }

      .tile span {
        font-size: 0.95rem;
        font-weight: 500;
        text-align: center;
      }

      /* ── App view ─────────────────────────────── */
      .app-view {
        display: none;
        position: fixed;
        inset: 0;
        flex-direction: column;
      }

      .app-view.active {
        display: flex;
      }

      .app-bar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        height: 40px;
        padding: 0 0.75rem;
        background: var(--bg-bar);
        border-bottom: 1px solid var(--border-bar);
        flex-shrink: 0;
      }

      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        background: none;
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        color: var(--btn-text);
        font-size: 0.8rem;
        padding: 0.25rem 0.6rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      .back-btn:hover {
        background: var(--btn-hover);
      }

      .app-bar-title {
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      .app-frame {
        flex: 1;
        border: none;
        width: 100%;
      }
    </style>
  </head>
  <body>

    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>

    <div class="hub" id="hub">
      <h1 class="hub-title">🐳 Manatee Hub</h1>
      <div class="grid" id="grid"></div>
    </div>

    <div class="app-view" id="app-view">
      <div class="app-bar">
        <button class="back-btn" id="back-btn">&#8592; Hub</button>
        <span class="app-bar-title" id="app-bar-title"></span>
      </div>
      <iframe class="app-frame" id="app-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
    </div>

    <script>
      const apps = [
        { name: 'Savings',          icon: './icons/savings.svg',         url: 'https://benselby2a.github.io/savings/' },
        { name: 'Finances',         icon: './icons/finances.svg',        url: 'https://benselby2a.github.io/finances/' },
        { name: 'Shopping List',    icon: './icons/shoppinglist.svg',    url: 'https://benselby2a.github.io/shoppinglist/' },
        { name: 'Holiday Planner',  icon: './icons/holidaycalendar.svg', url: 'https://benselby2a.github.io/holidaycalendar/' },
      ];

      const grid     = document.getElementById('grid');
      const hub      = document.getElementById('hub');
      const appView  = document.getElementById('app-view');
      const appFrame = document.getElementById('app-frame');
      const appTitle = document.getElementById('app-bar-title');
      const backBtn  = document.getElementById('back-btn');
      const toggle   = document.getElementById('theme-toggle');

      // Theme
      const saved = localStorage.getItem('hub-theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      }
      updateToggleIcon();

      toggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next === 'dark' ? '' : next);
        if (next === 'dark') document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('hub-theme', next);
        updateToggleIcon();
        sendThemeToFrame();
      });

      function getTheme() {
        return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      }

      function updateToggleIcon() {
        toggle.textContent = getTheme() === 'light' ? '☀️' : '🌙';
      }

      function sendThemeToFrame() {
        if (appFrame.contentWindow) {
          appFrame.contentWindow.postMessage({ type: 'theme', value: getTheme() }, '*');
        }
      }

      // Tiles
      apps.forEach(app => {
        const tile = document.createElement('a');
        tile.className = 'tile';
        tile.href = '#';
        tile.innerHTML = `<img src="${app.icon}" alt="${app.name}"><span>${app.name}</span>`;
        tile.addEventListener('click', e => {
          e.preventDefault();
          openApp(app);
        });
        grid.appendChild(tile);
      });

      function openApp(app) {
        hub.style.display = 'none';
        appView.classList.add('active');
        appTitle.textContent = app.name;
        appFrame.src = app.url;
        appFrame.onload = () => sendThemeToFrame();
        history.pushState({ app: app.name }, '', `#${app.name.toLowerCase().replace(/\s+/g, '-')}`);
      }

      function closeApp() {
        appView.classList.remove('active');
        hub.style.display = '';
        appFrame.src = '';
        history.pushState({}, '', location.pathname);
      }

      backBtn.addEventListener('click', closeApp);

      window.addEventListener('popstate', () => {
        if (appView.classList.contains('active')) {
          closeApp();
        }
      });
    </script>
  </body>
</html>
