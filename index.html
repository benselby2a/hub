<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐳🏠 Manatee Hub</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg-body: #0a0a1a;
        --bg-tile: #14142a;
        --border-tile: #2a2a4a;
        --border-tile-hover: #5a5a8a;
        --text: #e0e0e0;
        --text-muted: #808098;
        --bg-bar: #10102a;
        --border-bar: #2a2a4a;
        --btn-border: #3a3a5a;
        --btn-text: #c0c0e0;
        --btn-hover: #1e1e3e;
        --toggle-bg: #1e1e3e;
        --bg-input: #14142a;
        --bg-card: #14142a;
        --accent: #4a9eff;
        --error: #ef5350;
      }

      [data-theme="light"] {
        --bg-body: #f0f0f5;
        --bg-tile: #ffffff;
        --border-tile: #d0d0dd;
        --border-tile-hover: #8888aa;
        --text: #1a1a2e;
        --text-muted: #6a6a80;
        --bg-bar: #ffffff;
        --border-bar: #d0d0dd;
        --btn-border: #b0b0c0;
        --btn-text: #3a3a50;
        --btn-hover: #e4e4ee;
        --toggle-bg: #e0e0ea;
        --bg-input: #f5f5f8;
        --bg-card: #ffffff;
        --accent: #2a7ae0;
        --error: #d32f2f;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-body);
        color: var(--text);
        min-height: 100dvh;
      }

      /* ── Auth view ───────────────────────────── */
      .auth-view {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 2rem 1rem;
      }

      .auth-card {
        background: var(--bg-card);
        border: 1px solid var(--border-tile);
        border-radius: 16px;
        padding: 2rem;
        width: 100%;
        max-width: 360px;
      }

      .auth-card h2 {
        text-align: center;
        margin-bottom: 1.25rem;
      }

      .auth-card label {
        display: block;
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
        margin-top: 0.75rem;
      }

      .auth-card input {
        width: 100%;
        padding: 0.5rem 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--border-tile);
        background: var(--bg-input);
        color: var(--text);
        font-size: 0.9rem;
      }

      .auth-card input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .auth-card button[type="submit"] {
        width: 100%;
        margin-top: 1rem;
        padding: 0.55rem;
        border: none;
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }

      .auth-card button[type="submit"]:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .auth-error {
        color: var(--error);
        font-size: 0.8rem;
        margin-top: 0.5rem;
        text-align: center;
      }

      /* ── Top bar ────────────────────────────── */
      .top-bar {
        position: fixed;
        top: 0;
        right: 0;
        display: none;
        align-items: center;
        gap: 0.5rem;
        padding: 6px 0.75rem;
        z-index: 100;
      }

      .top-bar.active {
        display: flex;
      }

      .top-bar-user {
        font-size: 0.6rem;
        color: var(--text-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 140px;
      }

      .sign-out-btn {
        background: none;
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        color: var(--btn-text);
        font-size: 0.7rem;
        padding: 0.15rem 0.4rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      .sign-out-btn:hover {
        background: var(--btn-hover);
      }

      .theme-toggle {
        background: var(--toggle-bg);
        border: 1px solid var(--border-tile);
        border-radius: 6px;
        color: var(--text);
        font-size: 0.7rem;
        padding: 0.15rem 0.4rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }

      .theme-toggle:hover {
        background: var(--btn-hover);
      }

      /* ── Hub view ─────────────────────────────── */
      .hub {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 2rem 1rem;
      }

      .hub.active {
        display: flex;
      }

      .hub-title {
        font-size: 2rem;
        margin-bottom: 2rem;
        text-align: center;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 1.25rem;
        max-width: 480px;
        width: 100%;
      }

      .tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 1.5rem 1rem;
        border-radius: 16px;
        background: var(--bg-tile);
        border: 1px solid var(--border-tile);
        cursor: pointer;
        transition: transform 0.15s, border-color 0.15s;
        text-decoration: none;
        color: inherit;
      }

      .tile:hover {
        transform: translateY(-3px);
        border-color: var(--border-tile-hover);
      }

      .tile img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
      }

      .tile span {
        font-size: 0.95rem;
        font-weight: 500;
        text-align: center;
      }

      /* ── App view ─────────────────────────────── */
      .app-view {
        display: none;
        position: fixed;
        inset: 0;
        flex-direction: column;
      }

      .app-view.active {
        display: flex;
      }

      .app-bar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        height: 40px;
        padding: 0 0.75rem;
        background: var(--bg-bar);
        border-bottom: 1px solid var(--border-bar);
        flex-shrink: 0;
      }

      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        background: none;
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        color: var(--btn-text);
        font-size: 0.8rem;
        padding: 0.25rem 0.6rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      .back-btn:hover {
        background: var(--btn-hover);
      }

      .app-bar-title {
        font-size: 0.85rem;
        color: var(--text-muted);
        flex: 1;
      }

      .refresh-btn {
        background: none;
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        color: var(--btn-text);
        font-size: 1rem;
        padding: 0.15rem 0.5rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      .refresh-btn:hover {
        background: var(--btn-hover);
      }

      .app-frame {
        flex: 1;
        border: none;
        width: 100%;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>

    <div class="top-bar" id="top-bar">
      <span class="top-bar-user" id="top-bar-user"></span>
      <button class="sign-out-btn" id="sign-out-btn">Sign Out</button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
    </div>

    <div class="loading" id="loading">Loading...</div>

    <div class="auth-view" id="auth-view" style="display:none">
      <h1 style="margin-bottom:1.5rem">🐳 Manatee Hub</h1>
      <div class="auth-card">
        <h2>Sign In</h2>
        <form id="auth-form">
          <label for="auth-email">Email</label>
          <input id="auth-email" type="email" placeholder="you@example.com" required />
          <label for="auth-password">Password</label>
          <input id="auth-password" type="password" placeholder="Password" required minlength="6" />
          <div class="auth-error" id="auth-error"></div>
          <button type="submit" id="auth-submit">Sign In</button>
        </form>
      </div>
    </div>

    <div class="hub" id="hub">
      <h1 class="hub-title">🐳 Manatee Hub</h1>
      <div class="grid" id="grid"></div>
    </div>

    <div class="app-view" id="app-view">
      <div class="app-bar">
        <button class="back-btn" id="back-btn">&#8592; Hub</button>
        <span class="app-bar-title" id="app-bar-title"></span>
        <button class="refresh-btn" id="refresh-btn" aria-label="Force refresh app">&#x21bb;</button>
        <button class="theme-toggle" id="app-theme-toggle" aria-label="Toggle theme">🌙</button>
      </div>
      <iframe class="app-frame" id="app-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-storage-access-by-user-activation"></iframe>
    </div>

    <script>
      const SUPABASE_URL = 'https://cnkznpkvwoqxaiywwmhr.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_xlNQ_QudJNUlMLjWpr0iJA_YgO87tox';
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const apps = [
        { name: 'Savings',          icon: './icons/savings.svg',         url: 'https://benselby2a.github.io/savings/' },
        { name: 'Finances',         icon: './icons/finances.svg',        url: 'https://benselby2a.github.io/finances/' },
        { name: 'Shopping List',    icon: './icons/shoppinglist.svg',    url: 'https://benselby2a.github.io/shoppinglist/' },
        { name: 'Holiday Planner',  icon: './icons/holidaycalendar.svg', url: 'https://benselby2a.github.io/holidaycalendar/' },
      ];

      const els = {
        loading:    document.getElementById('loading'),
        authView:   document.getElementById('auth-view'),
        authForm:   document.getElementById('auth-form'),
        authEmail:  document.getElementById('auth-email'),
        authPass:   document.getElementById('auth-password'),
        authError:  document.getElementById('auth-error'),
        authSubmit: document.getElementById('auth-submit'),
        hub:        document.getElementById('hub'),
        topBar:     document.getElementById('top-bar'),
        topBarUser: document.getElementById('top-bar-user'),
        signOutBtn: document.getElementById('sign-out-btn'),
        grid:       document.getElementById('grid'),
        appView:    document.getElementById('app-view'),
        appFrame:   document.getElementById('app-frame'),
        appTitle:   document.getElementById('app-bar-title'),
        backBtn:    document.getElementById('back-btn'),
        refreshBtn: document.getElementById('refresh-btn'),
        toggle:     document.getElementById('theme-toggle'),
        appToggle:  document.getElementById('app-theme-toggle'),
      };

      // ── Theme ──────────────────────────────────
      const savedTheme = localStorage.getItem('hub-theme');
      if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
      updateToggleIcon();

      els.toggle.addEventListener('click', toggleTheme);

      function getTheme() {
        return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      }

      function updateToggleIcon() {
        const icon = getTheme() === 'light' ? '☀️' : '🌙';
        els.toggle.textContent = icon;
        if (els.appToggle) els.appToggle.textContent = icon;
      }

      function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        if (next === 'dark') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('hub-theme', next);
        updateToggleIcon();
        sendThemeToFrame();
      }

      if (els.appToggle) els.appToggle.addEventListener('click', toggleTheme);

      function sendThemeToFrame() {
        if (els.appFrame.contentWindow) {
          els.appFrame.contentWindow.postMessage({ type: 'theme', value: getTheme() }, '*');
        }
      }

      // ── Views ──────────────────────────────────
      function showView(view, userEmail) {
        els.loading.style.display = 'none';
        els.authView.style.display = 'none';
        els.hub.classList.remove('active');
        els.appView.classList.remove('active');
        els.topBar.classList.remove('active');

        if (view === 'auth') {
          els.authView.style.display = '';
        } else if (view === 'hub') {
          els.hub.classList.add('active');
          els.topBar.classList.add('active');
          els.topBarUser.textContent = userEmail || '';
        }
      }

      // ── Auth ───────────────────────────────────
      let currentUser = null;

      els.authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        els.authError.textContent = '';
        els.authSubmit.disabled = true;
        els.authSubmit.textContent = 'Signing in...';

        const { error } = await sb.auth.signInWithPassword({
          email: els.authEmail.value,
          password: els.authPass.value,
        });

        els.authSubmit.disabled = false;
        els.authSubmit.textContent = 'Sign In';

        if (error) {
          els.authError.textContent = error.message;
        }
      });

      els.signOutBtn.addEventListener('click', () => sb.auth.signOut());

      sb.auth.getSession().then(({ data: { session } }) => {
        if (session) {
          currentUser = session.user;
          showView('hub', session.user.email);
        } else {
          showView('auth');
        }
      });

      sb.auth.onAuthStateChange((_event, session) => {
        if (session) {
          currentUser = session.user;
          if (!els.appView.classList.contains('active')) {
            showView('hub', session.user.email);
          }
        } else {
          currentUser = null;
          showView('auth');
        }
      });

      // ── Tiles ──────────────────────────────────
      apps.forEach(app => {
        const tile = document.createElement('button');
        tile.className = 'tile';
        tile.type = 'button';
        tile.innerHTML = `<img src="${app.icon}" alt="${app.name}"><span>${app.name}</span>`;
        tile.addEventListener('click', () => openApp(app));
        els.grid.appendChild(tile);
      });

      function openApp(app) {
        els.hub.classList.remove('active');
        els.topBar.classList.remove('active');
        els.appView.classList.add('active');
        els.appTitle.textContent = '';
        els.appFrame.src = app.url;
        els.appFrame.onload = () => sendThemeToFrame();
        history.pushState({ app: app.name }, '', `#${app.name.toLowerCase().replace(/\s+/g, '-')}`);
      }

      function closeApp() {
        els.appView.classList.remove('active');
        els.hub.classList.add('active');
        els.topBar.classList.add('active');
        els.appFrame.src = '';
        history.pushState({}, '', location.pathname);
      }

      els.backBtn.addEventListener('click', closeApp);

      els.refreshBtn.addEventListener('click', () => {
        const currentSrc = els.appFrame.src;
        if (!currentSrc) return;
        const url = new URL(currentSrc);
        url.searchParams.set('_bust', Date.now());
        els.appFrame.src = url.toString();
        els.appFrame.onload = () => sendThemeToFrame();
      });

      window.addEventListener('popstate', () => {
        if (els.appView.classList.contains('active')) {
          closeApp();
        }
      });
    </script>
  </body>
</html>
